<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINEトーク履歴コンバーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen font-sans">
  <div class="max-w-6xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-4xl font-bold text-gray-800">LINEトーク履歴コンバーター</h1>
      <p class="text-gray-600 mt-2">ブラウザ内で完結する高機能変換ツール</p>
    </header>

    <div id="dropzone" class="dropzone border-4 border-dashed border-gray-300 rounded-3xl p-20 text-center cursor-pointer hover:border-emerald-400 bg-white">
      <div class="text-7xl mb-6">📄</div>
      <p class="text-2xl font-semibold text-gray-700">トーク履歴(.txt)をここにドロップ</p>
      <p class="text-gray-500 mt-2">またはクリックして選択</p>
      <input type="file" id="file" accept=".txt,text/plain" class="hidden">
    </div>

    <div class="flex gap-4 mt-8 items-center">
      <select id="encoding" class="px-6 py-4 border border-gray-300 rounded-2xl text-lg">
        <option value="utf-8">UTF-8（推奨）</option>
        <option value="shift_jis">Shift_JIS</option>
      </select>
      <button id="convert" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-xl py-5 rounded-3xl transition-all">変換する</button>
    </div>

    <div id="status" class="mt-6 text-center font-medium min-h-[32px] text-lg"></div>

    <div id="result" class="hidden mt-10 bg-white rounded-3xl shadow-2xl p-8">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8" id="stats"></div>

      <div class="flex flex-wrap gap-4 mb-6">
        <input type="text" id="search" placeholder="送信者または本文で検索..." class="flex-1 px-6 py-4 border border-gray-300 rounded-3xl text-lg focus:outline-none focus:border-emerald-500">
        <select id="sender-filter" class="px-6 py-4 border border-gray-300 rounded-3xl text-lg"></select>
      </div>

      <div class="flex gap-3 mb-6">
        <button data-view="table" class="view-btn active px-8 py-3 rounded-3xl font-semibold">テーブル</button>
        <button data-view="card" class="view-btn px-8 py-3 rounded-3xl font-semibold">カード</button>
      </div>

      <div id="table-view" class="overflow-x-auto rounded-2xl border">
        <table class="w-full">
          <thead class="bg-gray-50"><tr><th class="text-left py-5 px-6">日付</th><th class="text-left py-5 px-6">時刻</th><th class="text-left py-5 px-6">送信者</th><th class="text-left py-5 px-6">メッセージ</th></tr></thead>
          <tbody id="table-body" class="divide-y text-gray-700"></tbody>
        </table>
      </div>

      <div id="card-view" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-5"></div>

      <div class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4">
        <button id="dl-csv" class="py-5 bg-blue-600 text-white font-bold rounded-3xl">CSVダウンロード</button>
        <button id="dl-json" class="py-5 bg-amber-600 text-white font-bold rounded-3xl">JSONダウンロード</button>
        <button id="dl-xml" class="py-5 bg-purple-600 text-white font-bold rounded-3xl">XMLダウンロード</button>
        <button id="dl-txt" class="py-5 bg-gray-700 text-white font-bold rounded-3xl">整形TXT</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-8 right-8 px-8 py-4 rounded-3xl shadow-2xl text-white text-lg"></div>

  <script src="parser.js"></script>
  <script src="app.js"></script>
</body>
</html>
