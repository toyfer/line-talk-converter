<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LINEトーク履歴コンバーター</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero__inner">
          <p class="hero__eyebrow">LINE Export Converter</p>
          <h1 class="hero__title">LINEトーク履歴コンバーター</h1>
          <p class="hero__desc">
            LINEのトーク履歴 .txt を読み込み、検索・絞り込み・複数形式出力ができるブラウザ完結型ツールです。
          </p>
        </div>
      </header>

      <section class="panel">
        <div class="panel__header">
          <h2 class="panel__title">1. ファイルを選択</h2>
          <p class="panel__desc">
            .txt を選択、または下の領域にドロップしてください。
          </p>
        </div>

        <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="ファイルを選択">
          <div class="dropzone__icon">📄</div>
          <div class="dropzone__text">
            <strong>ファイルをドロップ</strong>
            <span>またはクリックして選択</span>
          </div>
          <input id="file" type="file" accept=".txt,text/plain" hidden />
        </div>

        <div class="form-grid">
          <div class="field field--wide">
            <label for="encoding" class="field__label">文字コード</label>
            <select id="encoding" class="field__control">
              <option value="utf-8">UTF-8（推奨）</option>
              <option value="shift_jis">Shift_JIS</option>
              <option value="euc-jp">EUC-JP</option>
              <option value="iso-8859-1">ISO-8859-1</option>
            </select>
          </div>

          <div class="field">
            <label for="previewLimit" class="field__label">プレビュー件数</label>
            <select id="previewLimit" class="field__control">
              <option value="100">100件</option>
              <option value="300" selected>300件</option>
              <option value="500">500件</option>
              <option value="1000">1000件</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="convert" class="btn btn--primary" type="button">変換する</button>
          <button id="downloadCsv" class="btn btn--secondary" type="button" disabled>CSV</button>
          <button id="downloadJson" class="btn btn--secondary" type="button" disabled>JSON</button>
          <button id="downloadXml" class="btn btn--secondary" type="button" disabled>XML</button>
          <button id="downloadTxt" class="btn btn--secondary" type="button" disabled>TXT</button>
          <button id="downloadHtml" class="btn btn--secondary" type="button" disabled>HTML</button>
          <button id="downloadMd" class="btn btn--secondary" type="button" disabled>Markdown</button>
          <button id="downloadTsv" class="btn btn--secondary" type="button" disabled>TSV</button>
        </div>

        <div id="status" class="status" aria-live="polite">
          ファイルを選択してください。
        </div>
      </section>

      <section id="summary" class="summary" hidden>
        <article class="summary-card">
          <span class="summary-card__label">ファイル名</span>
          <strong id="summaryFilename" class="summary-card__value">-</strong>
        </article>
        <article class="summary-card">
          <span class="summary-card__label">総件数</span>
          <strong id="summaryCount" class="summary-card__value">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-card__label">date欠損</span>
          <strong id="summaryMissingDate" class="summary-card__value">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-card__label">送信者数</span>
          <strong id="summarySenderCount" class="summary-card__value">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-card__label">期間</span>
          <strong id="summaryRange" class="summary-card__value">-</strong>
        </article>
        <article class="summary-card">
          <span class="summary-card__label">特殊件数</span>
          <strong id="summarySpecial" class="summary-card__value">0</strong>
        </article>
      </section>

      <section id="resultPanel" class="panel" hidden>
        <div class="panel__header">
          <h2 class="panel__title">2. フィルタとプレビュー</h2>
          <p class="panel__desc">
            送信者・日付・キーワードで絞り込みできます。
          </p>
        </div>

        <div class="toolbar toolbar--grid">
          <input id="search" class="search" type="search" placeholder="送信者・本文・日付で検索" />
          <select id="senderFilter" class="search">
            <option value="">すべての送信者</option>
          </select>
          <input id="dateFrom" class="search" type="date" />
          <input id="dateTo" class="search" type="date" />
        </div>

        <div class="view-switch">
          <button id="tableViewBtn" class="view-switch__btn is-active" type="button">テーブル</button>
          <button id="cardViewBtn" class="view-switch__btn" type="button">カード</button>
          <button id="statsViewBtn" class="view-switch__btn" type="button">統計</button>
        </div>

        <div id="tableView" class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th scope="col">date</th>
                <th scope="col">time</th>
                <th scope="col">sender</th>
                <th scope="col">type</th>
                <th scope="col">message</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="5" class="empty">まだデータがありません</td></tr>
            </tbody>
          </table>
        </div>

        <div id="cardView" class="card-list" hidden></div>
        <div id="statsView" class="stats-view" hidden></div>
      </section>

      <div id="toast" class="toast" hidden></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
